name: CD Pipeline - Prod

on:
  push:
    branches:
      - prod

jobs:
  security-scan:
    name: Job 1 - Scan Securite
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Pull image
        run: docker pull ${{ secrets.DOCKERHUB_USERNAME }}/intranet-newdeal:latest

      - name: Scan Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ secrets.DOCKERHUB_USERNAME }}/intranet-newdeal:latest
          format: table
          exit-code: '0'
          severity: HIGH,CRITICAL

  deploy:
    name: Job 2 - Deploiement Production
    runs-on: ubuntu-latest
    needs: security-scan
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Stop ancien container
        run: docker stop intranet-newdeal || true && docker rm intranet-newdeal || true

      - name: Pull et demarrer le container
        run: |
          docker pull ${{ secrets.DOCKERHUB_USERNAME }}/intranet-newdeal:latest
          docker run -d --name intranet-newdeal -p 80:80 \
            ${{ secrets.DOCKERHUB_USERNAME }}/intranet-newdeal:latest
